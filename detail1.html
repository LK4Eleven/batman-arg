<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帖子详情</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    background:#fff;
    max-width:600px;
    margin:0 auto;
    border-left:1px solid #eee;
    border-right:1px solid #eee;
    padding:16px;
}
.back{
    display:inline-block;
    color:#1d9bf0;
    text-decoration:none;
    margin-bottom:20px;
    font-size:18px;
}
/* 原发主帖 底部自带灰色分割线，隔开主楼与评论 */
.main-post{
    padding-bottom:24px;
    border-bottom:1px solid #eeeeee;
    margin-bottom:20px;
}
.avatar{
    width:48px;
    height:48px;
    border-radius:50%;
    float:left;
    margin-right:12px;
    cursor:pointer;
    background-size:cover;
    background-position:center;
}
.info{
    overflow:hidden;
    padding-top:4px;
}
.name{
    font-weight:bold;
    cursor:pointer;
    display:inline-block;
}
.tag{
    font-size:13px;
    color:#777;
    display:inline-block;
    margin-left:6px;
}
.content{
    clear:both;
    margin-top:12px;
    line-height:1.6;
    font-size:15px;
}
.content img{
    max-width:100%;
    margin-top:10px;
    border-radius:4px;
}
/* 单条评论 每条评论下方分割线 */
.comment-item{
    display:flex;
    gap:12px;
    padding:14px 0;
    border-bottom:1px solid #f0f0f0;
}
.comment-item .avatar{
    flex-shrink:0;
    margin-right:0;
}
.comment-item .info{
    flex:1;
    overflow:hidden;
}
.comment-item .content{
    clear:none;
    margin-top:6px;
}
</style>
</head>
<body>
<a class="back" onclick="history.back()">← 返回主页</a>

<!-- 你自己发布的主帖子 跳转home.html 完全原样保留 -->
<div class="main-post">
    <div class="avatar" onclick="location.href='home.html'" style="background:url('images/user.jpg') center/cover;"></div>
    <div class="info">
        <span class="name" onclick="location.href='home.html'">WhatIF</span>
        <span class="tag">@Message_WhatIf · 12小时</span>
    </div>
    <div class="content">
        我说最近蝙蝠侠是不是换人了啊（doge）
    </div>
</div>

<!-- 评论A 仅修改本条评论信息与跳转 -->
<div class="comment-item">
    <div class="avatar" onclick="location.href='npc.html'" style="background:url('images/default.jpg') center/cover;"></div>
    <div class="info">
        <span class="name" onclick="location.href='npc.html'">你找错了</span>
        <span class="tag">@bushizhongyaode · 12小时</span>
        <div class="content">
            嗯？
        </div>
    </div>
</div>

<!-- 评论B 仅修改本条评论信息与跳转 -->
<div class="comment-item">
    <div class="avatar" onclick="location.href='npc.html'" style="background:url('images/default.jpg') center/cover;"></div>
    <div class="info">
        <span class="name" onclick="location.href='npc.html'">你找错了</span>
        <span class="tag">@bushizhongyaode · 12小时</span>
        <div class="content">
            我好喜欢你对蝙蝠侠的看法！加个好友我仔细和你说说关于我的想法
        </div>
    </div>
</div>

</body>
</html>
