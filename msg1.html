<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私密通讯对话</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    background:#fff;
    max-width:600px;
    margin:0 auto;
    border-left:1px solid #eee;
    border-right:1px solid #eee;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}
/* 顶部对方信息栏 */
.chat-header{
    padding:12px 16px;
    border-bottom:1px solid #eee;
    display:flex;
    align-items:center;
    gap:10px;
}
.back-btn{
    color:#1d9bf0;
    text-decoration:none;
    font-size:18px;
}
.chat-avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    background:url("images/user (10).jpg") center/cover;
}
.chat-name{
    font-weight:bold;
}
.chat-id{
    font-size:13px;
    color:#777;
}
/* 聊天消息区域，可滚动 */
.chat-box{
    flex:1;
    overflow-y:auto;
    padding:16px;
}
/* 对方消息 居左 */
.msg-other{
    max-width:80%;
    background:#f2f2f2;
    padding:10px 14px;
    border-radius:18px 18px 18px 4px;
    margin-bottom:12px;
}
/* 自己消息 居右 */
.msg-self{
    max-width:80%;
    margin-left:auto;
    background:#1d9bf0;
    color:white;
    padding:10px 14px;
    border-radius:18px 18px 4px 18px;
    margin-bottom:12px;
}
.time-tip{
    font-size:11px;
    color:#999;
    text-align:center;
    margin:8px 0;
}
</style>
</head>
<body>
<div class="chat-header">
    <a class="back-btn" onclick="history.back()">←</a>
    <div class="chat-avatar"></div>
    <div>
        <div class="chat-name">一般路过大都会</div>
        <div class="chat-id">@contact</div>
    </div>
</div>

<div class="chat-box">
    <div class="time-tip">3天前</div>
    <!-- 对方发来消息 -->
    <div class="msg-other">
        嘿，你看了吗？超人今天又在大都会出现了！我和他擦肩而过啊啊啊啊啊啊啊啊啊啊啊啊啊
    </div>
    <!-- 你可以继续往下加多条对话 -->
    <div class="msg-self">
        你拍了吗？
    </div>
    <div class="msg-other">
        没有！我靠，好激动。感觉这辈子值了。
    </div>
   <div class="msg-self">
        ……出息
    </div>
    <div class="msg-other">
        真的！！！不过我就在外面，哎呀超人是不是还抱着一个人飞出来我也想在他怀里呜呜呜呜呜呜呜
    </div>
  <div class="msg-self">
        知道你很激动了，有没有能出图的让我发发？
    </div>
   <div class="msg-other">
        ，，这个真没有。我光顾着看超人了（哽咽）
    </div>
  <div class="msg-self">
        我有点想揍你了
    </div>
     <div class="msg-other">
        别这样嘛，当初蝙蝠侠来大都市不还是我抓拍的
    </div>
</div>
</body>
</html>
