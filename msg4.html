<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私信对话</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    max-width:600px;
    margin:0 auto;
    border-left:1px solid #eee;
    border-right:1px solid #eee;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}
.back{
    padding:12px 16px;
    font-size:18px;
    color:#1d9bf0;
    text-decoration:none;
    display:block;
}
.head{
    padding:14px 16px;
    border-bottom:1px solid #eee;
    display:flex;
    gap:12px;
    align-items:center;
}
.ava{
    width:44px;
    height:44px;
    border-radius:50%;
    background:url("images/drake.jpg") center/cover;
    cursor:pointer;
}
.info .n{
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
}
.info .id{
    font-size:13px;
    color:#777;
}
.box{
    flex:1;
    padding:16px;
}
/* 对方发来的消息 灰色左气泡 */
.other{
    background:#f1f1f1;
    padding:10px 12px;
    border-radius:12px 12px 12px 4px;
    max-width:85%;
    margin-bottom:12px;
    line-height:1.6;
    white-space:pre-line;
}
/* 玩家自己发送的消息 蓝色右气泡 */
.me{
    margin-left:auto;
    background:#1d9bf0;
    color:#fff;
    padding:10px 12px;
    border-radius:12px 12px 4px 12px;
    max-width:85%;
    margin-bottom:12px;
    text-align:right;
    white-space:pre-line;
}
</style>
</head>
<body>
<!-- 返回：玩家通讯消息列表页 home.html#message -->
<a class="back" href="home.html#message">←</a>

<div class="head">
    <!-- 头像点击跳转对方主页 new.html -->
    <div class="ava" onclick="location.href='new.html'"></div>
    <div class="info">
        <div class="n" onclick="location.href='new.html'">UHGURELQ</div>
        <div class="id">@youneverfindme</div>
    </div>
</div>

<div class="box">
  <div class="time-divider">8小时</div>
    <!-- 对方第一条 -->
    <div class="other">有关你的一些猜想我觉得很有意思。</div>
    <!-- 下面可以继续追加 .other（对方） / .me（你） 对话 -->
    <div class="me">我只是随便发帖感慨一下，你为什么这么问？</div> 
   <div class="other">我是谁不重要。重要的是我知道你。我知道屏幕后的你是什么样。你的行为我都看到了。</div>  
    <div class="me">我不明白你的意思。</div> 
   <div class="other">你想找到蝙蝠侠，这点上来看我们的目的相同。我给你一个机会，假如你能解开我的一点小谜题证明自己的价值，
   也许我会给你加入的机会。</div>  
   <div class="me">你到底什么意思？你是谁？
   是你往我邮箱里发的东西吗？你这是侵犯隐私了！我警告你，我随时都可以报警！</div>
   <div class="time-divider">3小时</div>
      <div class="me">你还在吗？</div>
</div>
</body>
</html>
